id = "chrome"
label = "Google Chrome"
schema_version = 1
use_scope = "productivity"
mode = "hybrid"
mouse_curve_default = "natural"
keyboard_dynamics_default = "natural"

[[matches]]
exe = "chrome.exe"
title_regex = ".* - Google Chrome$"

[[matches]]
exe = "msedge.exe"
title_regex = ".* - Microsoft Edge$"

[[matches]]
exe = "chromium.exe"

[capture]
target = "foreground_window"
min_update_interval_ms = 50
cursor_visible = true

[keymap]
address_bar = "ctrl+l"
back = "alt+left"
forward = "alt+right"
new_tab = "ctrl+t"
reload = "ctrl+r"
switch_tab_left = "ctrl+shift+tab"
switch_tab_right = "ctrl+tab"

[backends]
default = "auto"
keyboard_default = "auto"
mouse_default = "auto"
pad_default = "auto"

[metadata]
"registry.family" = "profile-registry/audit-data"
"registry.curated_seed" = "starter.v1"
"registry.curated_status" = "shipped_profile_needs_package"
"registry.curated_tier" = "productivity.seed"
"registry.curated_priority" = "p1"
"registry.backlog_issue" = "#481"
"registry.quality_signal" = "profile_quality.chrome"
"registry.minimum_manual_fsv" = "profile_list,profile_registry_install,observe,act_press,storage_inspect,profile_quality_refresh"
"registry.compatibility_target" = "chromium.windows"
"registry.safe_default_backend_policy" = "auto; local productivity only; no remote execution; audit export requires explicit consent"
