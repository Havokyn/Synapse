# Repo-local Cargo configuration.
#
# Cargo merges this with the user's global ~/.cargo/config.toml; for any key set
# in both, this file wins. The global config supplies host build parallelism
# (`[build] jobs = 16`) and `incremental = false`; this file adds codegen tuning
# that should travel WITH the repo so every checkout / contributor / CI-less gate
# produces the same optimized binary. See also Cargo.toml [profile.*].
#
# target-cpu = x86-64-v2 (chosen 2026-06-14):
#   Raises the codegen baseline from generic x86-64 (v1) to v2 — adds SSE3, SSSE3,
#   SSE4.1, SSE4.2, POPCNT, CMPXCHG16B. Every 64-bit Windows PC from ~2010 onward
#   supports v2, so the produced binary stays portable across ANY modern Windows
#   machine while letting LLVM auto-vectorize with the wider instruction set.
#   Applies to all profiles (dev + release), so the shipped daemon AND the local
#   test gates run on the same instruction baseline.
#
#   NOT v3 (AVX2): some still-shipping low-end Pentium/Celeron/Atom parts lack
#   AVX2, and a v3 binary would crash (illegal-instruction / SIGILL) on them.
#   To re-baseline higher (e.g. a known-modern fleet), change the value below to
#   "x86-64-v3" or "x86-64-v4"; to pin to the local CPU only, use "native".
# Linker: rust-lld (LLVM lld in MSVC/lld-link mode), shipped inside the toolchain
# sysroot, chosen 2026-06-14 for build speed.
#   Linking is a serial, whole-program step that dominates incremental rebuild
#   time on Windows. The default MSVC `link.exe` is markedly slower than LLD;
#   switching to rust-lld typically cuts link time by 2-5x with an IDENTICAL,
#   fully-portable PE binary (the linker only assembles objects — codegen/LTO is
#   unchanged, so runtime perf and the shipped release binary are unaffected).
#
#   `linker = "rust-lld"` resolves the bare name from the active toolchain's
#   sysroot (no machine-specific path), so it auto-tracks `rustup update` and can
#   never drift to a stale linker version. `linker-flavor=lld-link` tells the
#   multi-call rust-lld binary to run in MSVC mode (it is not named `lld-link`,
#   so the flavor must be explicit). Both flags are STABLE on 1.95 for the host
#   target — verified empirically (cargo build -v shows lld-link, never link.exe).
#   If rust-lld is ever missing, linking ERRORS LOUDLY — there is no silent
#   fallback to link.exe. Re-baseline target-cpu notes below still apply.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
rustflags = ["-C", "target-cpu=x86-64-v2", "-C", "linker-flavor=lld-link"]
